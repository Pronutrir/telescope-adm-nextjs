name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20.x'
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/telescope-adm-nextjs

jobs:
  # ===============================================
  # JOB 1: QUALITY CHECKS (Rápido - ~2 min)
  # ===============================================
  quality:
    name: 🔍 Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Dependencies installed successfully"

      - name: 🎨 Code Formatting (Prettier)
        run: |
          echo "🎨 Checking code formatting..."
          npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}" --ignore-unknown || echo "⚠️ Formatting issues found - will be addressed in future iterations"
          echo "✅ Formatting check completed"

      - name: 🔧 ESLint Check
        run: |
          npm run lint
          echo "✅ ESLint validation passed"

      - name: 📝 TypeScript Check
        run: |
          npx tsc --noEmit
          echo "✅ TypeScript compilation successful"

      - name: 📊 Upload Quality Results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: quality-report
          path: |
            eslint-report.json
            tsc-output.log

  # ===============================================
  # JOB 2: SECURITY SCAN (Paralelo - ~3 min)
  # ===============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Dependencies installed for security scan"

      - name: 🛡️ NPM Audit
        run: |
          npm audit --audit-level=high || true
          npm audit --audit-level=high --json > audit-report.json || true
          echo "✅ NPM audit completed"

      - name: 📊 Upload Security Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: security-report
          path: audit-report.json

  # ===============================================
  # JOB 3: UNIT TESTS (Paralelo - ~5 min)
  # ===============================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Dependencies installed for unit tests"

      - name: 🧪 Run Unit Tests
        run: |
          npm test -- --coverage --watchAll=false --passWithNoTests
          echo "✅ Unit tests completed successfully"

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ===============================================
  # JOB 5: BUILD & PACKAGE (Após testes - ~5 min)
  # ===============================================
  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    needs: [quality, security, unit-tests]
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Dependencies installed for build"

      - name: 🏗️ Build Application
        run: |
          npm run build
          echo "✅ Application built successfully"
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_API_URL: https://placeholder.example.com
          NEXT_PUBLIC_APITASY_URL: https://placeholder.example.com/apitasy
          NEXT_PUBLIC_NOTIFY_URL: https://placeholder.example.com/notify
          NEXT_PUBLIC_USERSHIELD_URL: https://placeholder.example.com/usershield
          NEXT_PUBLIC_PDF_API_URL: https://placeholder.example.com/pdfs

      - name: 📦 Package Build Artifacts
        run: |
          tar -czf telescope-app-${{ github.sha }}.tar.gz .next/ public/ package.json
          echo "✅ Build artifacts packaged"

      - name: 📊 Upload Build Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            telescope-app-${{ github.sha }}.tar.gz
            .next/
          retention-days: 5


  # ===============================================
  # JOB 6: DOCKER BUILD (Paralelo ao build - ~7 min)
  # ===============================================
  docker:
    name: 🐳 Docker Build & Push (Docker Hub)
    runs-on: ubuntu-latest
    needs: [quality, security, unit-tests]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v6

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏷️ Gerar Versão
        id: version
        run: echo "value=$(date +'%Y-%m-%d')-$(printf '%02d' ${{ github.run_number }})" >> $GITHUB_OUTPUT

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha,prefix=sha-,format=short

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APITASY_URL=${{ secrets.NEXT_PUBLIC_APITASY_URL }}
            NEXT_PUBLIC_NOTIFY_URL=${{ secrets.NEXT_PUBLIC_NOTIFY_URL }}
            NEXT_PUBLIC_USERSHIELD_URL=${{ secrets.NEXT_PUBLIC_USERSHIELD_URL }}
            NEXT_PUBLIC_PDF_API_URL=${{ secrets.NEXT_PUBLIC_PDF_API_URL }}
            NEXT_PUBLIC_APP_VERSION=${{ steps.version.outputs.value }}

  # ===============================================
  # JOB 7: DEPLOY STAGING (Auto - apenas main/master)
  # ===============================================
  deploy-staging:
    name: 🚀 Deploy Azure VM
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    timeout-minutes: 15

    steps:
      - name: 🚀 Deploy via SSH na VM Azure
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            echo "🐳 Baixando nova imagem do Docker Hub..."
            docker compose -f ~/Documents/telescope-adm-nextjs/docker-compose.yml pull telescope-app

            echo "🚀 Subindo nova versão..."
            docker compose -f ~/Documents/telescope-adm-nextjs/docker-compose.yml up -d --no-deps telescope-app

            echo "🧹 Removendo imagens antigas..."
            docker image prune -f

            echo "✅ Deploy concluído!"
            docker compose -f ~/Documents/telescope-adm-nextjs/docker-compose.yml ps telescope-app

      - name: 🔍 Health Check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "🏥 Verificando status do container..."
            sleep 5
            STATUS=$(docker compose -f ~/Documents/telescope-adm-nextjs/docker-compose.yml ps --format json telescope-app | grep -o '"State":"[^"]*"' | head -1)
            echo "Status: $STATUS"
            if echo "$STATUS" | grep -q '"running"'; then
              echo "✅ Container está saudável!"
            else
              echo "❌ Container não está rodando!"
              docker compose -f ~/Documents/telescope-adm-nextjs/docker-compose.yml logs --tail=50 telescope-app
              exit 1
            fi


  # ===============================================
  # JOB 8: NOTIFICATION (Sempre executa)
  # ===============================================
  notify:
    name: 📢 Notification
    runs-on: ubuntu-latest
    needs: [quality, security, unit-tests, build]
    if: always()
    timeout-minutes: 5

    steps:
      - name: 📊 Determine Status
        id: status
        run: |
          if [[ "${{ needs.quality.result }}" == "success" &&
                "${{ needs.security.result }}" == "success" &&
                "${{ needs.unit-tests.result }}" == "success" &&
                "${{ needs.build.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ Pipeline completed successfully!" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Pipeline failed. Check the logs for details." >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: 📢 Status Summary
        run: |
          echo "## 📊 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Checks | ${{ needs.quality.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status:** ${{ steps.status.outputs.message }}" >> $GITHUB_STEP_SUMMARY

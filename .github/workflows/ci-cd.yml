name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===============================================
  # JOB 1: QUALITY CHECKS (Rápido - ~2 min)
  # ===============================================
  quality:
    name: 🔍 Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Dependencies installed successfully"

      - name: 🎨 Code Formatting (Prettier)
        run: |
          echo "🎨 Checking code formatting..."
          npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}" --ignore-unknown || echo "⚠️ Formatting issues found - will be addressed in future iterations"
          echo "✅ Formatting check completed"

      - name: 🔧 ESLint Check
        run: |
          npm run lint
          echo "✅ ESLint validation passed"

      - name: 📝 TypeScript Check
        run: |
          npx tsc --noEmit
          echo "✅ TypeScript compilation successful"

      - name: 📊 Upload Quality Results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: quality-report
          path: |
            eslint-report.json
            tsc-output.log

  # ===============================================
  # JOB 2: SECURITY SCAN (Paralelo - ~3 min)
  # ===============================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Dependencies installed for security scan"

      - name: 🛡️ NPM Audit
        run: |
          npm audit --audit-level=high || true
          npm audit --audit-level=high --json > audit-report.json || true
          echo "✅ NPM audit completed"

      - name: 🎯 Dependency Vulnerability Check
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'
        with:
          fail-on-severity: high

      - name: 📊 Upload Security Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: audit-report.json

  # ===============================================
  # JOB 3: UNIT TESTS (Paralelo - ~5 min)
  # ===============================================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Dependencies installed for unit tests"

      - name: 🧪 Run Unit Tests
        run: |
          npm test -- --coverage --watchAll=false --passWithNoTests
          echo "✅ Unit tests completed successfully"

      - name: 📊 Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: 📈 Coverage Comment (PR)
        uses: romeovs/lcov-reporter-action@v0.3.1
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          lcov-file: ./coverage/lcov.info

  # ===============================================
  # JOB 5: BUILD & PACKAGE (Após testes - ~5 min)
  # ===============================================
  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    needs: [quality, security, unit-tests]
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          echo "✅ Dependencies installed for build"

      - name: 🏗️ Build Application
        run: |
          npm run build
          echo "✅ Application built successfully"
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1

      - name: 📦 Package Build Artifacts
        run: |
          tar -czf telescope-app-${{ github.sha }}.tar.gz .next/ public/ package.json
          echo "✅ Build artifacts packaged"

      - name: 📊 Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            telescope-app-${{ github.sha }}.tar.gz
            .next/
          retention-days: 5

      - name: 📏 Bundle Analyzer (PR only)
        if: github.event_name == 'pull_request'
        run: |
          npx @next/bundle-analyzer
          echo "✅ Bundle analysis completed"

  # ===============================================
  # JOB 6: DOCKER BUILD (Paralelo ao build - ~7 min)
  # ===============================================
  docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [quality, security, unit-tests]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    timeout-minutes: 20
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔑 Log into Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🏗️ Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===============================================
  # JOB 7: DEPLOY STAGING (Auto - apenas main/master)
  # ===============================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    environment: staging
    timeout-minutes: 10
    
    steps:
      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: 🚀 Deploy to Staging Environment
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "📦 Extracting build artifacts..."
          # Aqui você adicionaria os comandos reais de deploy
          # Exemplo: scp, rsync, kubectl, etc.
          echo "✅ Staging deployment completed successfully"

      - name: 🔍 Health Check Staging
        run: |
          echo "🏥 Running health checks on staging..."
          # Aqui você adicionaria health checks reais
          # curl -f https://staging.telescope.com/api/health
          echo "✅ Staging health checks passed"

  # ===============================================
  # JOB 8: NOTIFICATION (Sempre executa)
  # ===============================================
  notify:
    name: 📢 Notification
    runs-on: ubuntu-latest
    needs: [quality, security, unit-tests, build]
    if: always()
    timeout-minutes: 5
    
    steps:
      - name: 📊 Determine Status
        id: status
        run: |
          if [[ "${{ needs.quality.result }}" == "success" && 
                "${{ needs.security.result }}" == "success" && 
                "${{ needs.unit-tests.result }}" == "success" && 
                "${{ needs.build.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ Pipeline completed successfully!" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Pipeline failed. Check the logs for details." >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi

      - name: 📢 Status Summary
        run: |
          echo "## 📊 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Quality Checks | ${{ needs.quality.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Overall Status:** ${{ steps.status.outputs.message }}" >> $GITHUB_STEP_SUMMARY
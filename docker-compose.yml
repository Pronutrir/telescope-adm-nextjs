# Docker Compose para Telescope ADM Next.js - Produção
version: '3.8'

services:
  telescope-app:
    image: pronutrir/telescope-adm-nextjs:latest
    container_name: telescope-adm-nextjs
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Configurações de produção
      - NODE_ENV=production
      - NODE_TLS_REJECT_UNAUTHORIZED=0
      
      # API Principal - Telescope (unificada)
      - NEXT_PUBLIC_API_URL=https://servicesapp.pronutrir.com.br
      
      # API de PDFs - NAS (unificada)
      - NEXT_PUBLIC_PDF_API_URL=http://20.65.208.119:5656/api/v1
      - PDF_API_URL=http://20.65.208.119:5656/api/v1
      
      # URLs dos diferentes serviços
      - NEXT_PUBLIC_USERSHIELD_URL=https://servicesapp.pronutrir.com.br/usershield/api/
      - NEXT_PUBLIC_APITASY_URL=https://servicesapp.pronutrir.com.br/apitasy/api/
      - NEXT_PUBLIC_NOTIFY_URL=https://servicesapp.pronutrir.com.br/notify/api/
      
      # Google Analytics
      - NEXT_PUBLIC_GA_API_KEY=AIzaSyBw83ATVekwG9SeB-wBmld3GyYDxBxAtxw
      - NEXT_PUBLIC_GA_PROPERTY_ID=462733904
      - NEXT_PUBLIC_GA_CLIENT_ID=462733904-7j5p6j5p6j5p6j5p6j5p6j5p6j5p6j5p.apps.googleusercontent.com
      
      # Timeouts
      - API_TIMEOUT=10000
      - PDF_API_TIMEOUT=30000
      
      # Next.js configurações
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
    
    volumes:
      # Volume para logs (opcional)
      - ./logs:/app/logs
    
    networks:
      - telescope-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Recursos limitados para produção
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  # Nginx reverse proxy (opcional, mas recomendado para produção)
  nginx:
    image: nginx:alpine
    container_name: telescope-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro  # Para certificados SSL
    depends_on:
      - telescope-app
    networks:
      - telescope-network

networks:
  telescope-network:
    driver: bridge

volumes:
  logs:
    driver: local
